name: Publish on Github, Curseforge & Modrinth

on: [ workflow_dispatch ]

env:
  RELEASE_NAME: 0.5.17 for Minecraft 1.21.9-1.21.10
  VERSION: 0.5.17
  MC_VERSION: mc1.21.10

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v6
      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'microsoft'
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build
        run: ./gradlew build

      - name: publish (CurseForge/Modrinth/Github)
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          github-tag: "${{env.MC_VERSION}}-${{env.VERSION}}"
          github-token: ${{ secrets.PUBLISH_GITHUB_TOKEN }}

          modrinth-id: HtGckJVc
          modrinth-token: ${{ secrets.PUBLISH_MODRINTH_TOKEN }}

          curseforge-id: 693995
          curseforge-token: ${{ secrets.PUBLISH_CURSEFORGE_TOKEN }}

          name: "${{env.RELEASE_NAME}}"
          version: "${{env.VERSION}}"
          changelog-file: CHANGELOG.md
          files: build/libs/!(*-@(dev|sources|javadoc)).jar

          loaders: fabric
          game-versions: |
            1.21.9
            1.21.10
          java: |
            21
            22
            23
            24
            25
